name: Sync upstream Mammotion-HA

on:
  repository_dispatch:
    types: [pymammotion-updated]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/mikey0000/Mammotion-HA.git
          git fetch upstream

      - name: Resolve PyMammotion tag
        id: pymammotion
        run: |
          if [ -n "${{ github.event.client_payload.tag }}" ]; then
            TAG="${{ github.event.client_payload.tag }}"
          else
            TAG=$(curl -sf "https://api.github.com/repos/craigusus/PyMammotion/tags" | jq -r '.[0].name')
          fi
          echo "Using PyMammotion tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check for new upstream commits
        id: check
        run: |
          COUNT=$(git rev-list HEAD..upstream/main --count)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "$COUNT new upstream commit(s)"

      - name: Check protected files
        if: steps.check.outputs.count != '0'
        id: guard
        run: |
          CHANGED=$(git diff HEAD...upstream/main --name-only)
          echo "Files changed upstream:"
          echo "$CHANGED"
          # manifest.json always conflicts and is always auto-fixed — not a protected file
          FLAGGED=""
          for f in custom_components/mammotion/lawn_mower.py; do
            if echo "$CHANGED" | grep -qx "$f"; then
              FLAGGED="${FLAGGED}- \`${f}\`\n"
            fi
          done
          if [ -n "$FLAGGED" ]; then
            echo "safe=false" >> $GITHUB_OUTPUT
            {
              echo 'flagged<<EOF'
              printf "%b" "$FLAGGED"
              echo EOF
            } >> $GITHUB_OUTPUT
          else
            echo "safe=true" >> $GITHUB_OUTPUT
          fi

      - name: Open issue — protected files changed
        if: steps.check.outputs.count != '0' && steps.guard.outputs.safe == 'false'
        uses: actions/github-script@v7
        env:
          FLAGGED: ${{ steps.guard.outputs.flagged }}
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Manual review needed — upstream touches patched files',
              body: [
                'Upstream Mammotion-HA has new commits that touch files we have patched:',
                '',
                process.env.FLAGGED,
                '',
                'Merge manually and verify our patches still apply cleanly.'
              ].join('\n'),
              labels: ['upstream-sync']
            })

      - name: Merge upstream
        if: steps.check.outputs.count != '0' && steps.guard.outputs.safe != 'false'
        id: merge
        run: |
          if git merge --no-edit upstream/main; then
            echo "outcome=success" >> $GITHUB_OUTPUT
          else
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            OTHER=$(echo "$CONFLICTS" | grep -v '^custom_components/mammotion/manifest\.json$' || true)
            if [ -z "$OTHER" ]; then
              # Only manifest.json conflicts — take ours (we overwrite it in the next step anyway)
              git checkout --ours custom_components/mammotion/manifest.json
              git add custom_components/mammotion/manifest.json
              git -c core.editor=true merge --continue
              echo "outcome=success" >> $GITHUB_OUTPUT
            else
              git merge --abort
              echo "outcome=conflict" >> $GITHUB_OUTPUT
              echo "conflicts=$(echo "$OTHER" | tr '\n' ' ')" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Open issue — unexpected merge conflict
        if: steps.merge.outputs.outcome == 'conflict'
        uses: actions/github-script@v7
        env:
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Upstream merge conflict',
              body: `Automatic merge from upstream failed.\n\nConflicts in: \`${process.env.CONFLICTS}\`\n\nManual merge required.`,
              labels: ['upstream-sync']
            })

      - name: Update manifest.json
        if: steps.merge.outputs.outcome != 'conflict' && steps.guard.outputs.safe != 'false'
        env:
          PYMAMMOTION_TAG: ${{ steps.pymammotion.outputs.tag }}
        run: |
          python3 << 'PYEOF'
          import json, os
          tag = os.environ["PYMAMMOTION_TAG"]
          url = f"pymammotion @ https://github.com/craigusus/PyMammotion/archive/refs/tags/{tag}.tar.gz"
          with open("custom_components/mammotion/manifest.json") as f:
              manifest = json.load(f)
          manifest["requirements"] = [url]
          with open("custom_components/mammotion/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          PYEOF

      - name: Commit and push
        if: steps.merge.outputs.outcome != 'conflict' && steps.guard.outputs.safe != 'false'
        run: |
          git add custom_components/mammotion/manifest.json
          if ! git diff --staged --quiet; then
            git commit -m "fix: update pymammotion to ${{ steps.pymammotion.outputs.tag }}"
          fi
          git push origin main
